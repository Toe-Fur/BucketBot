services:
  bucket-bot:
    # Use remote build context so you don't need to clone the files manually on the server
    build: .
    container_name: bucket-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - LOWES_USERNAME=YourSalesID
      - LOWES_PASSWORD=YourPassword
      - LOWES_PIN=1234
      - RUN_MODE=daily
      - RUN_VALUE=08:00
      - TZ=America/New_York
      # - LOWES_DISCORD_WEBHOOK=your_webhook_url
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/app/data/lowes_bot.lock') else 1)"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
